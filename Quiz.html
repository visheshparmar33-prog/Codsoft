<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>quiz · Builder</title>
  <style>
    *{box-sizing:border-box; margin:0; font-family:system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;}
    body{background:#e2ebf5; display:flex; min-height:100vh; padding:0.8rem;}
    .app{max-width:780px; width:100%; margin:auto; background:white; border-radius:2rem; padding:1.5rem 1.8rem; box-shadow:0 15px 30px #9bb1cf;}
    .top{display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; margin-bottom:1rem;}
    h2{color:#12263b; font-size:1.9rem; font-weight:650;}
    .nav{display:flex; gap:0.3rem; flex-wrap:wrap; margin:1rem 0 1.5rem;}
    .nav button{background:transparent; border:none; padding:0.5rem 1.3rem; border-radius:40px; font-weight:600; font-size:1rem; color:#132a44; cursor:pointer; border:1.5px solid transparent;}
    .nav .active{background:#132a44; color:white; box-shadow:0 4px 8px #b7ceea;}
    .nav button:not(.active):hover{background:#e4eefa; border-color:#b2c9e8;}
    .page{display:block;}
    .hidden{display:none !important;}
    .card{background:#f4faff; border-radius:2rem; padding:1.5rem; border:2px solid #c7daf2; font-size:1rem;}
    button{padding:0.7rem 1.6rem; border-radius:40px; border:none; font-weight:600; font-size:1rem; background:#132a44; color:white; cursor:pointer; margin:0.2rem; box-shadow:0 3px 0 #0b1d30; transition:0.05s;}
    button:active{transform:translateY(3px); box-shadow:0 1px 0 #0b1d30;}
    .btn-light{background:white; color:#132a44; border:2px solid #b9cfef; box-shadow:0 3px 0 #b0c4e2;}
    input{margin:0.6rem 0; padding:0.8rem 1.3rem; border-radius:60px; border:2px solid #c6d8f2; width:100%; font-size:1rem; background:white;}
    input:focus{outline:none; border-color:#132a44; box-shadow:0 0 0 3px rgba(19,42,68,0.2);}
    .opt-row{display:flex; gap:0.5rem; margin:0.6rem 0; align-items:center;}
    .opt-row input{flex:1; margin:0;}
    .remove{background:#ffdcdc; color:#b13b3b; border:none; border-radius:50%; width:2.3rem; height:2.3rem; font-size:1.2rem; font-weight:bold; box-shadow:0 2px 0 #dba5a5; padding:0;}
    .quiz-item{background:white; border-radius:2rem; padding:1.2rem 1.5rem; display:flex; justify-content:space-between; align-items:center; border:2px solid #c8dbf2; margin:0.8rem 0; font-size:1rem;}
    .quiz-item h4{font-size:1.5rem; margin-bottom:0.1rem;}
    .footer{text-align:center; margin-top:1.8rem;}
    .demo-link{background:#e3edfe; padding:0.5rem 2rem; border-radius:40px; display:inline-block; font-weight:600; font-size:1rem; border:2px solid #b5cbed; cursor:pointer;}
    #optionsArea label{display:block; margin:1rem 0; font-size:1.1rem; background:#edf4ff; padding:0.8rem 1.5rem; border-radius:50px; border:2px solid transparent;}
    #optionsArea input[type="radio"]{width:1.2rem; height:1.2rem; margin-right:1rem;}
    #scoreDisplay{font-size:3rem; color:#132a44; margin:0.8rem 0;}
  </style>
</head>
<body>
<div class="app">
  <div class="top">
    <h2>📋 Quiz.Builder</h2>
  </div>

  <!-- tabs -->
  <div class="nav" id="nav">
    <button class="active" data-page="home">🏠 home</button>
    <button data-page="create">➕ create</button>
    <button data-page="list">📋 list</button>
    <button data-page="take">▶️ take</button>
    <button data-page="result">📊 result</button>
  </div>

  <!-- pages -->
  <div id="home" class="page">
    <div class="card" style="text-align:center;">
      <h3 style="font-size:2rem; margin-bottom:0.8rem;">👋 hello</h3>
      <p style="font-size:1.3rem; margin-bottom:2rem;">create or take a quiz</p>
      <div style="display:flex; gap:1.2rem; justify-content:center; flex-wrap:wrap;">
        <div style="background:white; padding:1.5rem 1.2rem; border-radius:2.2rem; width:160px; cursor:pointer; border:2px solid #bed2f0; box-shadow:0 6px 0 #aec2e0;" id="homeCreate">
          <h4 style="font-size:2rem;">📝</h4>
          <p style="font-size:1.3rem;">create</p>
        </div>
        <div style="background:white; padding:1.5rem 1.2rem; border-radius:2.2rem; width:160px; cursor:pointer; border:2px solid #bed2f0; box-shadow:0 6px 0 #aec2e0;" id="homeTake">
          <h4 style="font-size:2rem;">🎯</h4>
          <p style="font-size:1.3rem;">take</p>
        </div>
      </div>
    </div>
  </div>

  <div id="create" class="page hidden">
    <div class="card">
      <h3 style="font-size:1.8rem; margin-bottom:1rem;">✏️ new quiz</h3>
      <input id="quizTitle" placeholder="quiz title (e.g. science)" value="demo">
      <div id="qBlocks">
        <!-- first question block -->
        <div class="qBlock" style="border-bottom:2px dashed #a9c2e3; margin:1.2rem 0; padding-bottom:1rem;">
          <input class="qText" placeholder="question" value="2+2 ?">
          <div class="opt-group">
            <div class="opt-row"><input class="opt" value="3"><button class="remove" onclick="this.parentElement.remove()">✕</button></div>
            <div class="opt-row"><input class="opt" value="4"><button class="remove" onclick="this.parentElement.remove()">✕</button></div>
          </div>
          <input class="correct" placeholder="correct answer" value="4">
          <button class="btn-light addOpt" style="margin:0.5rem 0;">➕ option</button>
        </div>
      </div>
      <div style="display:flex; gap:0.8rem; flex-wrap:wrap;">
        <button id="addQ">➕ add question</button>
        <button id="saveQuiz" style="background:#0f4c3a;">💾 save quiz</button>
      </div>
    </div>
  </div>

  <div id="list" class="page hidden">
    <div class="card" id="quizList"></div>
  </div>

  <div id="take" class="page hidden">
    <div class="card">
      <h3 id="takeTitle" style="font-size:1.8rem;"></h3>
      <p id="qCounter" style="font-size:1.2rem; margin:0.5rem 0;"></p>
      <div style="background:white; border-radius:2rem; padding:1.5rem; border:2px solid #d2e2f8;">
        <p id="currentQ" style="font-size:1.6rem; font-weight:600;"></p>
        <div id="optionsArea"></div>
      </div>
      <div style="display:flex; gap:0.8rem; margin-top:1.2rem; flex-wrap:wrap;">
        <button id="prevQ" disabled>← prev</button>
        <button id="nextQ">next →</button>
        <button id="submitTake" style="background:#1f5f2e;">✅ submit</button>
      </div>
    </div>
  </div>

  <div id="result" class="page hidden">
    <div class="card" style="text-align:center;">
      <h2 id="scoreDisplay">0/0</h2>
      <div id="resultDetail" style="font-size:1.1rem; text-align:left; margin:1.5rem 0;"></div>
      <button id="backHome">🏠 home</button>
    </div>
  </div>

  <div class="footer">
    <span class="demo-link" id="demoBtn">▶️ FOR DEMO CLICK HERE</span>
  </div>
</div>

<script>
  (function() {
    // --- data ---
    let quizzes = [{ title:'sample', questions:[ { text:'2+2?', options:['3','4','5'], correct:'4' }, { text:'capital of france?', options:['paris','london','berlin'], correct:'paris' } ] }];
    let selectedIdx = 0, currQ = 0, answers = [];
    let lastScore = { ok:0, total:0, details:[] };

    // --- helpers ---
    const $ = s => document.querySelector(s);
    const $$ = s => document.querySelectorAll(s);
    const showPage = (id) => { $$('.page').forEach(p => p.classList.add('hidden')); $(`#${id}`).classList.remove('hidden'); updateActiveTab(id); };
    const updateActiveTab = (id) => { $$('#nav button').forEach(b => b.classList.remove('active')); $(`#nav button[data-page="${id}"]`).classList.add('active'); };
    
    // --- tab clicks ---
    $$('#nav button').forEach(btn => btn.addEventListener('click', e => showPage(btn.dataset.page)));
    $('#homeCreate').onclick = () => showPage('create');
    $('#homeTake').onclick = () => { renderQuizList(); showPage('list'); };
    $('#backHome').onclick = () => showPage('home');

    // --- render quiz list ---
    function renderQuizList() {
      let html = '';
      quizzes.forEach((q, i) => html += `<div class="quiz-item"><div><h4>${q.title}</h4><span style="font-size:0.95rem;">${q.questions.length} question(s)</span></div><button class="takeBtn" data-idx="${i}">take</button></div>`);
      $('#quizList').innerHTML = html || '<p>no quizzes — create one!</p>';
      $$('.takeBtn').forEach(b => b.addEventListener('click', e => {
        selectedIdx = +e.target.dataset.idx; currQ = 0; 
        answers = new Array(quizzes[selectedIdx].questions.length).fill(null);
        loadTake(); showPage('take');
      }));
    }

    // --- load take ---
    function loadTake() {
      let qz = quizzes[selectedIdx];
      if (!qz) return;
      $('#takeTitle').innerText = qz.title;
      showQuestion();
    }
    function showQuestion() {
      let qz = quizzes[selectedIdx], q = qz.questions[currQ];
      $('#currentQ').innerText = q.text;
      $('#qCounter').innerText = `Q${currQ+1} / ${qz.questions.length}`;
      let html = '';
      q.options.forEach(opt => {
        let checked = answers[currQ] === opt ? 'checked' : '';
        html += `<label style="border:${checked ? '2px solid #132a44' : '2px solid transparent'};"><input type="radio" name="takeOpt" value="${opt}" ${checked}> ${opt}</label>`;
      });
      $('#optionsArea').innerHTML = html;
      $$('input[name="takeOpt"]').forEach(r => r.onchange = (e) => answers[currQ] = e.target.value);
      $('#prevQ').disabled = currQ === 0;
      $('#nextQ').disabled = currQ === qz.questions.length-1;
    }
    $('#prevQ').onclick = () => { if(currQ>0){currQ--; showQuestion();} };
    $('#nextQ').onclick = () => { let qz=quizzes[selectedIdx]; if(currQ < qz.questions.length-1){currQ++; showQuestion();} };
    $('#submitTake').onclick = () => {
      let qz = quizzes[selectedIdx], correct=0, details=[];
      qz.questions.forEach((q,i) => {
        let ans = answers[i];
        let ok = ans && ans.toLowerCase() === q.correct.toLowerCase();
        if(ok) correct++;
        details.push({q:q.text, yours:ans||'(none)', correct:q.correct, ok});
      });
      lastScore = { ok:correct, total:qz.questions.length, details };
      $('#scoreDisplay').innerText = `${correct}/${qz.questions.length}`;
      let dhtml = '';
      details.forEach(d => dhtml += `<p style="background:#edf4ff; padding:0.8rem 1.5rem; border-radius:2rem; margin:0.7rem 0;">${d.q} — your: ${d.yours} ${d.ok?'✅':'❌'} (correct: ${d.correct})</p>`);
      $('#resultDetail').innerHTML = dhtml;
      showPage('result');
    };

    // --- quiz creation dynamic ---
    function addOption(block) {
      let row = document.createElement('div'); row.className = 'opt-row';
      row.innerHTML = `<input class="opt" value="new"><button class="remove" onclick="this.parentElement.remove()">✕</button>`;
      block.querySelector('.opt-group').appendChild(row);
    }
    $('#addQ').onclick = () => {
      let block = document.createElement('div'); block.className = 'qBlock'; block.style.borderBottom = '2px dashed #a9c2e3'; block.style.margin = '1.2rem 0'; block.style.paddingBottom = '1rem';
      block.innerHTML = `<input class="qText" placeholder="question" value="?"><div class="opt-group"><div class="opt-row"><input class="opt" value="A"><button class="remove" onclick="this.parentElement.remove()">✕</button></div><div class="opt-row"><input class="opt" value="B"><button class="remove" onclick="this.parentElement.remove()">✕</button></div></div><input class="correct" placeholder="correct" value="A"><button class="btn-light addOpt" style="margin:0.5rem 0;">➕ add option</button>`;
      $('#qBlocks').appendChild(block);
      block.querySelector('.addOpt').onclick = () => addOption(block);
    };
    // initial bind for addOpt
    $$('.addOpt').forEach(btn => btn.onclick = (e) => addOption(btn.closest('.qBlock')));

    $('#saveQuiz').onclick = () => {
      let title = $('#quizTitle').value || 'untitled';
      let blocks = $$('.qBlock');
      let questions = [];
      for(let b of blocks) {
        let qText = b.querySelector('.qText')?.value.trim() || '?';
        let opts = [...b.querySelectorAll('.opt')].map(o => o.value.trim()).filter(v=>v);
        let correct = b.querySelector('.correct')?.value.trim() || '';
        if(opts.length) questions.push({text:qText, options:opts, correct});
      }
      if(questions.length) quizzes.push({title, questions});
      renderQuizList(); showPage('list');
    };

    // --- demo seed ---
    $('#demoBtn').onclick = () => {
      quizzes.push({ title:'🌍 geography demo', questions:[ { text:'largest ocean?', options:['atlantic','indian','pacific'], correct:'pacific' }, { text:'everest is in?', options:['nepal','china','india'], correct:'nepal' } ] });
      renderQuizList(); showPage('list');
    };

    // init
    renderQuizList(); showPage('home');
  })();
</script>
</body>
</html>
